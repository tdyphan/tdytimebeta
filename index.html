<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="TdyTime - Your Today, Your Time" />
    <meta name="theme-color" content="#ffffff" />
    <!-- Critical CSS — app shell only (avoid render-blocking wait for full CSS) -->
    <style>
      html.dark { color-scheme: dark; background-color: #020617; }
      html { background-color: #f8fafc; }
      body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    </style>

    <!-- 🎯 Critical translations embedded in i18n/config.ts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <!-- Async font loading — non-render-blocking -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700&family=Montserrat:wght@600;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700&family=Montserrat:wght@600;800&display=swap"></noscript>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <title>TdyTime - Your Today, Your Time</title>
    <script>
      // On page load or when changing themes, best to add inline in `head` to avoid FOUC
      if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
      } else {
          document.documentElement.classList.remove('dark')
      }
    </script>
  </head>
  <body>
    <div id="root">
      <style>
        .initial-loader-wrapper {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          display: flex;
          align-items: center;
          justify-content: center;
          background-color: #ffffff;
          transition: background-color 0.2s ease;
          z-index: 9999;
        }
        @media (prefers-color-scheme: dark) {
          .initial-loader-wrapper {
            background-color: #020617; /* Matches slate-950 */
          }
        }
        .initial-loader {
          width: 40px;
          height: 40px;
          border: 3px solid rgba(59, 130, 246, 0.2); /* blue-500 with opacity */
          border-radius: 50%;
          border-top-color: #3b82f6; /* blue-500 */
          animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
        /* Fade out loader when root is populated */
        #root:not(:empty) .initial-loader-wrapper {
          display: none;
        }
      </style>
      <div class="initial-loader-wrapper">
        <div class="initial-loader"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
